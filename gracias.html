<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta enviada | MAJ Asesoría Jurídica</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body.gracias-page {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d9d4cc;
      padding: 20px;
      box-sizing: border-box;
    }

    .gracias-card {
      background: #22314d;
      color: #ffffff;
      max-width: 560px;
      width: 100%;
      border-radius: 18px;
      padding: 40px 30px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.18);
      text-align: center;
    }

    .gracias-card h1 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 2rem;
    }

    .gracias-card p {
      margin: 0 0 24px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .gracias-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gracias-btn {
      display: inline-block;
      background: #c89b45;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .gracias-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .gracias-btn.secundario {
      background: transparent;
      border: 1px solid #ffffff;
    }
  </style>
</head>
<body class="gracias-page">
  <div class="gracias-card">
    <h1>¡Consulta enviada con éxito!</h1>
    <p>
      Gracias por comunicarte con <strong>MAJ Asesoría Jurídica</strong>.
      Hemos recibido tu información y pronto te responderemos.
    </p>

    <div class="gracias-actions">
      <a class="gracias-btn" href="index.html">Volver al inicio</a>
      <a class="gracias-btn secundario" href="https://wa.me/573102567625?text=Hola,%20acabo%20de%20enviar%20mi%20consulta%20desde%20la%20p%C3%A1gina%20web%20y%20quisiera%20dar%20seguimiento." target="_blank">
        Ir a WhatsApp
      </a>
    </div>
  </div>
</body>
</html>
